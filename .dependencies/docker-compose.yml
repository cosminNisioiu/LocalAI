
version: "3.9"

services:
  ollama:
    image: ollama/ollama
    container_name: ollaba
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "
      ollama serve &
      sleep 5 &&
      ollama pull llama3 &&
      wait
      "

volumes:
  ollama_data:
